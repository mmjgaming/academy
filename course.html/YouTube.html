<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Started | MMJ Gaming Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            font-family: 'Space Grotesk', sans-serif;
            color: #fff;
            overflow: hidden;
            position: relative;
        }

        /* Grid background */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        /* Animated border card */
        .card {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 3rem 4rem;
            background: #111;
            border-radius: 24px;
            max-width: 560px;
            width: 90%;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 26px;
            background: conic-gradient(from var(--angle, 0deg), #e74c3c, #f39c12, #2ecc71, #3498db, #9b59b6, #e74c3c);
            z-index: -1;
            animation: rotateBorder 4s linear infinite;
        }

        .card::after {
            content: '';
            position: absolute;
            inset: 2px;
            border-radius: 22px;
            background: #111;
            z-index: -1;
        }

        @keyframes rotateBorder {
            to { --angle: 360deg; }
        }

        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        /* Icon */
        .icon-wrap {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: rgba(231, 76, 60, 0.1);
            border: 2px solid rgba(231, 76, 60, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: breathe 2.5s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); border-color: rgba(231, 76, 60, 0.3); }
            50% { transform: scale(1.08); border-color: rgba(231, 76, 60, 0.7); }
        }

        .icon-wrap svg {
            width: 36px;
            height: 36px;
            stroke: #e74c3c;
        }

        /* Text */
        .label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #e74c3c;
            margin-bottom: 0.75rem;
        }

        .heading {
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.75rem;
            line-height: 1.3;
        }

        .desc {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.45);
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        /* Divider */
        .divider {
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, #e74c3c, #f39c12);
            margin: 0 auto 2rem;
            border-radius: 3px;
        }

        /* Button */
        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 13px 32px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            background: transparent;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 14px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .home-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            opacity: 0;
            transition: opacity 0.35s ease;
            z-index: -1;
            border-radius: 12px;
        }

        .home-btn:hover {
            border-color: #e74c3c;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(231, 76, 60, 0.3);
        }

        .home-btn:hover::before {
            opacity: 1;
        }

        .home-btn:active {
            transform: translateY(0);
        }

        .home-btn svg {
            width: 18px;
            height: 18px;
            transition: transform 0.3s ease;
        }

        .home-btn:hover svg {
            transform: translateX(-3px);
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: 0;
            animation: drift 8s ease-in-out infinite alternate;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: #e74c3c;
            top: -100px;
            right: -50px;
        }

        .orb-2 {
            width: 250px;
            height: 250px;
            background: #3498db;
            bottom: -80px;
            left: -60px;
            animation-delay: 3s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: #f39c12;
            top: 50%;
            left: 10%;
            animation-delay: 5s;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -20px) scale(1.15); }
        }

        @media (max-width: 500px) {
            .card {
                padding: 2rem 1.5rem;
            }
            .home-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="card">
        <div class="icon-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
            </svg>
        </div>

        <p class="label">Coming Soon</p>
        <h1 class="heading">This is not currently started.</h1>
        <p class="desc">This section hasn't been launched yet.<br>Stay tuned for updates!</p>

        <div class="divider"></div>

        <a href="https://mmjgaming.github.io/academy" class="home-btn">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
            </svg>
            Back to home
        </a>
    </div>

</body>
</html>
