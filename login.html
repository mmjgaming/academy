<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MMJ Academy - Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #030712;
    color: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: absolute;
    top: -30%; left: -20%;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(6,182,212,0.08) 0%, transparent 70%);
    filter: blur(80px);
    pointer-events: none;
  }

  body::after {
    content: '';
    position: absolute;
    bottom: -30%; right: -20%;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(37,99,235,0.08) 0%, transparent 70%);
    filter: blur(80px);
    pointer-events: none;
  }

  .container {
    background: #0a0a0a;
    border: 1px solid rgba(255,255,255,0.07);
    padding: 40px 36px;
    border-radius: 16px;
    width: 100%;
    max-width: 400px;
    position: relative;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  }

  .container::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 40%);
    pointer-events: none;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    cursor: pointer;
    text-decoration: none;
  }

  .brand-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: linear-gradient(to top right, #06b6d4, #2563eb);
    box-shadow: 0 4px 12px rgb(6 182 212 / 0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .brand h2 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.02em;
    background: linear-gradient(to right, #fff, #94a3b8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .container h1 {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.03em;
    margin-bottom: 8px;
    position: relative;
  }

  .container > p.desc {
    color: #64748b;
    font-size: 13px;
    font-weight: 300;
    line-height: 1.6;
    margin-bottom: 24px;
    position: relative;
  }

  .field { margin-bottom: 14px; position: relative; }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: #94a3b8;
    margin-bottom: 6px;
    letter-spacing: 0.02em;
  }

  .field input {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    background: rgba(255,255,255,0.03);
    color: #ffffff;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    outline: none;
  }

  .field input::placeholder { color: #475569; }

  .field input:focus {
    border-color: rgba(34,211,238,0.4);
    background: rgba(34,211,238,0.03);
    box-shadow: 0 0 0 3px rgba(34,211,238,0.06);
  }

  .btn-primary {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(to right, #0891b2, #2563eb);
    color: #ffffff;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 0 16px rgba(6,182,212,0.2);
    font-family: 'Inter', sans-serif;
    margin-top: 6px;
    position: relative;
  }

  .btn-primary:hover {
    box-shadow: 0 0 28px rgba(6,182,212,0.4);
    transform: translateY(-1px);
  }

  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .divider {
    text-align: center;
    margin: 20px 0;
    color: #334155;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.06);
  }

  .btn-oauth {
    width: 100%;
    padding: 11px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    background: rgba(255,255,255,0.02);
    color: #cbd5e1;
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-oauth:hover {
    border-color: rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.04);
    color: #fff;
  }

  .btn-oauth svg { width: 18px; height: 18px; }

  .bottom-text {
    text-align: center;
    margin-top: 24px;
    font-size: 13px;
    color: #64748b;
    position: relative;
  }

  .bottom-text a {
    color: #22d3ee;
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s;
  }

  .bottom-text a:hover { color: #06b6d4; }

  .terms {
    text-align: center;
    margin-top: 16px;
    font-size: 11px;
    color: #475569;
    line-height: 1.5;
    position: relative;
  }

  .toast {
    position: fixed;
    top: 24px;
    right: 24px;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    z-index: 999;
    transform: translateX(calc(100% + 40px));
    transition: transform 0.3s ease;
    max-width: 360px;
    line-height: 1.4;
  }

  .toast.show { transform: translateX(0); }

  .toast.success {
    background: rgba(16,185,129,0.15);
    border: 1px solid rgba(52,211,153,0.3);
    color: #34d399;
  }

  .toast.error {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(248,113,113,0.3);
    color: #f87171;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .container { animation: fadeUp 0.5s ease forwards; }
</style>
</head>

<body>

<div class="toast" id="toast"></div>

<div class="container">
  <a href="index.html" class="brand">
    <div class="brand-icon">📘</div>
    <h2>MMJ Academy</h2>
  </a>

  <h1>Welcome Back</h1>
  <p class="desc">Login to access your courses, downloads, and exclusive content.</p>

  <div class="field">
    <label>Email</label>
    <input id="email" type="email" placeholder="Enter your email">
  </div>

  <div class="field">
    <label>Password</label>
    <input id="password" type="password" placeholder="Enter your password">
  </div>

  <button class="btn-primary" id="submitBtn" onclick="login()">Login</button>

  <div class="divider">OR</div>

  <button class="btn-oauth" id="googleBtn" onclick="googleLogin()">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </button>

  <button class="btn-oauth" id="githubBtn" onclick="githubLogin()">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
    </svg>
    Continue with GitHub
  </button>

  <p class="bottom-text">
    Don't have an account? <a href="signup.html">Get Started</a>
  </p>

  <p class="terms">
    By continuing, you agree to our academy terms and conditions.
  </p>
</div>

<script>
  const supabaseClient = supabase.createClient(
    "https://hegyyjazkmovyyczotnw.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhlZ3l5amF6a21vdnl5Y3pvdG53Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NDUyNzIsImV4cCI6MjA5MDAyMTI3Mn0._UMi4rG9RGc0rTsko2w8oEYmbXzdVEkwjnh1Uk6f8PE"
  );

  // If user is already logged in, send to index
  async function checkExisting() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
      window.location.replace("index.html");
    }
  }
  checkExisting();

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type + ' show';
    setTimeout(() => { t.classList.remove('show'); }, 4000);
  }

  async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('submitBtn');

    if (!email || !password) {
      showToast('Please fill in all fields.', 'error');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Logging in...';

    const { error } = await supabaseClient.auth.signInWithPassword({
      email: email,
      password: password
    });

    if (error) {
      showToast(error.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Login';
    } else {
      showToast('Login successful! Redirecting...', 'success');
      setTimeout(() => {
        window.location.replace("index.html");
      }, 800);
    }
  }

  async function googleLogin() {
    document.getElementById('googleBtn').textContent = 'Redirecting...';
    const { error } = await supabaseClient.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.origin + window.location.pathname.replace('login.html', 'index.html')
      }
    });
    if (error) {
      showToast(error.message, 'error');
      document.getElementById('googleBtn').innerHTML = '<svg viewBox="0 0 24 24" fill="none" style="width:18px;height:18px"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Continue with Google';
    }
  }

  async function githubLogin() {
    document.getElementById('githubBtn').textContent = 'Redirecting...';
    const { error } = await supabaseClient.auth.signInWithOAuth({
      provider: 'github',
      options: {
        redirectTo: window.location.origin + window.location.pathname.replace('login.html', 'index.html')
      }
    });
    if (error) {
      showToast(error.message, 'error');
      document.getElementById('githubBtn').innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg> Continue with GitHub';
    }
  }

  document.querySelectorAll('.field input').forEach(input => {
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') login();
    });
  });
</script>

</body>
</html>
